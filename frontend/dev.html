<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MEASURE OS — 開発ログ確認</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f5f7;
      --card: #fff;
      --border: #e5e5ea;
      --text: #1c1c1e;
      --sub: #8e8e93;
      --blue: #0071e3;
      --green: #34c759;
      --amber: #ff9f0a;
      --red: #ff3b30;
      --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
           background: var(--bg); color: var(--text); font-size: 14px; }

    /* ヘッダー */
    .header { background: #1c1c1e; padding: 14px 20px; display: flex; align-items: center;
              gap: 12px; position: sticky; top: 0; z-index: 100; }
    .header h1 { color: #fff; font-size: 0.95rem; font-weight: 700; }
    .header .badge { background: #3a3a3c; color: #ebebf5; font-size: 0.65rem;
                     font-weight: 700; padding: 2px 8px; border-radius: 6px; letter-spacing: 0.05em; }
    .header .note { color: rgba(255,255,255,0.35); font-size: 0.72rem; margin-left: auto; }

    /* フィルターバー */
    .toolbar { display: flex; gap: 10px; align-items: center; padding: 16px 20px; flex-wrap: wrap; }
    .toolbar input, .toolbar select {
      padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 0.85rem; font-family: inherit; background: var(--card); color: var(--text);
      outline: none;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--blue); }
    .toolbar input { width: 200px; }
    .load-btn { padding: 9px 18px; background: var(--blue); color: #fff; border: none;
                border-radius: 8px; font-size: 0.85rem; font-weight: 700; font-family: inherit;
                cursor: pointer; }
    .load-btn:hover { opacity: 0.88; }
    .count-badge { font-size: 0.78rem; color: var(--sub); margin-left: 4px; }

    /* テーブル */
    .table-wrap { overflow-x: auto; padding: 0 20px 40px; }
    table { width: 100%; border-collapse: collapse; background: var(--card);
            border-radius: var(--radius); overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    thead th { background: #f2f2f7; padding: 10px 14px; text-align: left;
               font-size: 0.72rem; font-weight: 700; color: var(--sub);
               letter-spacing: 0.06em; text-transform: uppercase;
               border-bottom: 1px solid var(--border); white-space: nowrap; }
    tbody tr { border-bottom: 1px solid #f2f2f7; cursor: pointer; transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f9f9fb; }
    tbody td { padding: 11px 14px; font-size: 0.83rem; vertical-align: middle;
               white-space: nowrap; }
    .mono { font-family: "SF Mono", "Courier New", monospace; font-size: 0.78rem; color: var(--sub); }

    /* ステータスバッジ */
    .status { display: inline-block; padding: 2px 8px; border-radius: 6px;
              font-size: 0.72rem; font-weight: 700; }
    .s-normal { background: #e8fdf0; color: #1a7a3e; }
    .s-blue   { background: #e5f1ff; color: #0057b3; }
    .s-red    { background: #fff0ef; color: #c0392b; }
    .s-closed { background: #f2f2f7; color: var(--sub); }

    /* フラグ */
    .flag-true  { color: var(--red); font-weight: 700; }
    .flag-false { color: #c7c7cc; }
    .flag-warn  { color: var(--amber); font-weight: 700; }

    /* 詳細パネル */
    .detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
                      display: none; align-items: flex-end; justify-content: center; }
    .detail-overlay.open { display: flex; }
    .detail-sheet { background: var(--card); border-radius: 20px 20px 0 0; width: 100%;
                    max-width: 660px; max-height: 88vh; overflow-y: auto; padding: 28px 24px 48px; }
    .detail-title { font-size: 1rem; font-weight: 800; margin-bottom: 20px; display: flex;
                    align-items: center; justify-content: space-between; }
    .detail-close { background: none; border: none; font-size: 1.2rem; cursor: pointer;
                    color: var(--sub); padding: 4px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 480px) { .detail-grid { grid-template-columns: 1fr; } }
    .detail-item { background: #f9f9fb; border-radius: 10px; padding: 12px 14px; }
    .detail-key { font-size: 0.68rem; font-weight: 700; color: var(--sub);
                  letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
    .detail-val { font-size: 0.92rem; font-weight: 600; word-break: break-all; }
    .detail-val.mono { font-size: 0.82rem; font-family: "SF Mono", monospace; }
    .detail-section { grid-column: 1 / -1; margin: 6px 0 4px;
                      font-size: 0.7rem; font-weight: 700; color: var(--sub);
                      letter-spacing: 0.08em; text-transform: uppercase; padding-bottom: 4px;
                      border-bottom: 1px solid var(--border); }
    .lines-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 8px; }
    .lines-table th { text-align: left; padding: 5px 8px; color: var(--sub);
                      font-size: 0.68rem; font-weight: 700; border-bottom: 1px solid var(--border); }
    .lines-table td { padding: 6px 8px; border-bottom: 1px solid #f2f2f7; }

    /* 空状態 */
    .empty { text-align: center; padding: 60px 20px; color: var(--sub); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* トースト */
    .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
             background: rgba(28,28,30,0.88); color: #fff; padding: 10px 20px;
             border-radius: 30px; font-size: 0.84rem; opacity: 0;
             transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <h1>MEASURE OS</h1>
  <span class="badge">DEV LOG</span>
  <span class="note">開発・検証専用画面</span>
</div>

<!-- フィルターバー -->
<div class="toolbar">
  <input id="company-input" placeholder="company_id（例: company_a）" />
  <select id="status-filter">
    <option value="">すべてのステータス</option>
    <option value="normal">normal</option>
    <option value="blue">blue</option>
    <option value="red">red</option>
    <option value="closed">closed</option>
  </select>
  <button class="load-btn" onclick="loadLogs()">読み込む</button>
  <span class="count-badge" id="count-badge"></span>
</div>

<!-- テーブル -->
<div class="table-wrap">
  <div id="empty-state" class="empty">
    <div class="empty-icon">📋</div>
    <div>company_id を入力して「読み込む」を押してください</div>
  </div>
  <table id="log-table" style="display:none;">
    <thead>
      <tr>
        <th>ID</th>
        <th>営業日</th>
        <th>task_id</th>
        <th>process_id</th>
        <th>user_id</th>
        <th>ステータス</th>
        <th>着手</th>
        <th>予告値</th>
        <th>実績値</th>
        <th>差分</th>
        <th>欠損</th>
        <th>差異</th>
        <th>無効フロー</th>
        <th>A/B</th>
        <th>入力元</th>
        <th>作成日時</th>
      </tr>
    </thead>
    <tbody id="log-body"></tbody>
  </table>
</div>

<!-- 詳細パネル -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detail-sheet">
    <div class="detail-title">
      <span id="detail-title-text">記録詳細</span>
      <button class="detail-close" onclick="closeDetailBtn()">✕</button>
    </div>
    <div class="detail-grid" id="detail-grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "";
let allRecords = [];
let _devUnit = "個";

async function api(path) {
  try {
    const res = await fetch(API + path);
    if (!res.ok) { toast(`エラー: ${res.status}`); return null; }
    return await res.json();
  } catch (e) {
    toast("通信エラー");
    return null;
  }
}

async function loadLogs() {
  const company = document.getElementById("company-input").value.trim();
  if (!company) { toast("company_id を入力してください"); return; }

  // 企業設定から unit を取得
  const settings = await api(`/企業設定/${encodeURIComponent(company)}`);
  _devUnit = settings?.unit || "個";

  const data = await api(`/作業記録/一覧?company_id=${encodeURIComponent(company)}&limit=200`);
  if (!Array.isArray(data)) return;

  allRecords = data;
  renderTable();
}

function renderTable() {
  const statusFilter = document.getElementById("status-filter").value;
  const records = statusFilter ? allRecords.filter(r => r.status === statusFilter) : allRecords;

  document.getElementById("count-badge").textContent =
    records.length ? `${records.length} 件` : "0 件";

  if (records.length === 0) {
    document.getElementById("log-table").style.display = "none";
    document.getElementById("empty-state").style.display = "block";
    document.getElementById("empty-state").innerHTML =
      '<div class="empty-icon">🔍</div><div>該当するレコードがありません</div>';
    return;
  }

  document.getElementById("empty-state").style.display = "none";
  document.getElementById("log-table").style.display = "table";

  const tbody = document.getElementById("log-body");
  tbody.innerHTML = records.map(r => {
    const ab = (r.anomaly_type_a && r.anomaly_type_b) ? "A+B"
             : r.anomaly_type_a ? "A"
             : r.anomaly_type_b ? "B"
             : "—";
    const abClass = (r.anomaly_type_a || r.anomaly_type_b) ? "flag-warn" : "flag-false";
    return `
      <tr onclick="showDetail(${r.id})">
        <td class="mono">#${r.id}</td>
        <td>${r.business_date}</td>
        <td>${r.task_id}</td>
        <td>${r.process_id}</td>
        <td>${r.user_id}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${r.started_at ? fmtTime(r.started_at) : '<span class="flag-false">—</span>'}</td>
        <td>${r.planned_value != null ? r.planned_value + " " + _devUnit : '<span class="flag-false">—</span>'}</td>
        <td>${r.actual_value != null ? r.actual_value + " " + _devUnit : '<span class="flag-false">—</span>'}</td>
        <td>${r.diff_value != null ? diffCell(r.diff_value) + " " + _devUnit : '<span class="flag-false">—</span>'}</td>
        <td>${flag(r.is_missing)}</td>
        <td>${flag(r.is_diff_anomaly)}</td>
        <td>${flag(r.is_invalid_flow)}</td>
        <td class="${abClass}">${ab}</td>
        <td class="mono">${r.input_source || "—"}</td>
        <td class="mono">${fmtDatetime(r.created_at)}</td>
      </tr>
    `;
  }).join("");
}

document.getElementById("status-filter").addEventListener("change", renderTable);

function showDetail(id) {
  const r = allRecords.find(x => x.id === id);
  if (!r) return;

  document.getElementById("detail-title-text").textContent =
    `#${r.id} — ${r.business_date} / ${r.user_id}`;

  const fields = [
    // 識別情報
    { section: "識別情報" },
    { key: "id",           val: r.id },
    { key: "company_id",   val: r.company_id },
    { key: "task_id",      val: r.task_id },
    { key: "process_id",   val: r.process_id },
    { key: "user_id",      val: r.user_id },
    { key: "business_date",val: r.business_date },
    // タイムライン
    { section: "タイムライン" },
    { key: "created_at",   val: fmtDatetime(r.created_at) },
    { key: "started_at",   val: r.started_at ? fmtDatetime(r.started_at) : "未着手" },
    { key: "actual_at",    val: r.actual_at  ? fmtDatetime(r.actual_at)  : "未記録" },
    { key: "planned_at",   val: r.planned_at ? fmtDatetime(r.planned_at) : "未記録" },
    { key: "input_source", val: r.input_source || "—" },
    // 数値
    { section: "数値" },
    { key: "planned_value",val: r.planned_value != null ? `${r.planned_value} ${_devUnit}` : "—" },
    { key: "actual_value", val: r.actual_value  != null ? `${r.actual_value} ${_devUnit}` : "—" },
    { key: "diff_value",   val: r.diff_value    != null ? `${r.diff_value} ${_devUnit}` : "—" },
    // ステータス・フラグ
    { section: "ステータス・フラグ" },
    { key: "status",            val: r.status },
    { key: "is_missing",        val: r.is_missing        ? "true ⚠️" : "false" },
    { key: "is_diff_anomaly",   val: r.is_diff_anomaly   ? "true ⚠️" : "false" },
    { key: "is_invalid_flow",   val: r.is_invalid_flow   ? "true ⚠️" : "false" },
    { key: "is_exception",      val: r.is_exception      ? "true" : "false" },
    { key: "selected_pattern",
      val: (r.anomaly_type_a && r.anomaly_type_b) ? "A+B（プロセス不備＋結果不備）"
         : r.anomaly_type_a ? "A（プロセス不備）"
         : r.anomaly_type_b ? "B（結果不備）"
         : "なし" },
    { key: "forecast_ref_id",   val: r.forecast_ref_id ?? "—" },
  ];

  const grid = document.getElementById("detail-grid");
  grid.innerHTML = fields.map(f => {
    if (f.section) {
      return `<div class="detail-section">${f.section}</div>`;
    }
    return `
      <div class="detail-item">
        <div class="detail-key">${f.key}</div>
        <div class="detail-val">${f.val}</div>
      </div>
    `;
  }).join("");

  // 実績行
  if (r.actual_lines && r.actual_lines.length > 0) {
    grid.innerHTML += `
      <div class="detail-section">実績行（actual_lines）</div>
      <div style="grid-column:1/-1;">
        <table class="lines-table">
          <thead><tr><th>#</th><th>対象</th><th>数量</th><th>category</th><th>target_selected</th><th>qty_entered</th></tr></thead>
          <tbody>
            ${r.actual_lines.map((l, i) => `
              <tr>
                <td>${i + 1}</td>
                <td>${l.item_name || l.item_name_free || '<span style="color:#c7c7cc">未選択</span>'}</td>
                <td>${l.value != null ? `${l.value} ${_devUnit}` : '<span style="color:#c7c7cc">未入力</span>'}</td>
                <td>${l.category || "—"}</td>
                <td>${l.target_selected  ? "✓" : "—"}</td>
                <td>${l.quantity_entered ? "✓" : "—"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  // 予告行
  if (r.planned_lines && r.planned_lines.length > 0) {
    grid.innerHTML += `
      <div class="detail-section">予告行（planned_lines）</div>
      <div style="grid-column:1/-1;">
        <table class="lines-table">
          <thead><tr><th>#</th><th>対象</th><th>数量</th><th>category</th></tr></thead>
          <tbody>
            ${r.planned_lines.map((l, i) => `
              <tr>
                <td>${i + 1}</td>
                <td>${l.item_name || l.item_name_free || '<span style="color:#c7c7cc">未選択</span>'}</td>
                <td>${l.value != null ? `${l.value} ${_devUnit}` : '<span style="color:#c7c7cc">未入力</span>'}</td>
                <td>${l.category || "—"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  // 異常
  if (r.anomalies && r.anomalies.length > 0) {
    grid.innerHTML += `
      <div class="detail-section">異常（anomalies）</div>
      <div style="grid-column:1/-1;">
        <table class="lines-table">
          <thead><tr><th>anomaly_type</th><th>status</th><th>detected_at</th><th>resolved_at</th></tr></thead>
          <tbody>
            ${r.anomalies.map(a => `
              <tr>
                <td>${a.anomaly_type}</td>
                <td>${a.status}</td>
                <td>${fmtDatetime(a.detected_at)}</td>
                <td>${a.resolved_at ? fmtDatetime(a.resolved_at) : "—"}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;
  }

  document.getElementById("detail-overlay").classList.add("open");
}

function closeDetail(e) {
  if (e.target === document.getElementById("detail-overlay")) closeDetailBtn();
}
function closeDetailBtn() {
  document.getElementById("detail-overlay").classList.remove("open");
}

// ─── ユーティリティ ───────────────────────────────
function statusBadge(s) {
  const map = {
    normal: ["s-normal", "normal"],
    blue:   ["s-blue",   "blue ●"],
    red:    ["s-red",    "red ●"],
    closed: ["s-closed", "closed"],
  };
  const [cls, label] = map[s] || ["s-normal", s];
  return `<span class="status ${cls}">${label}</span>`;
}

function flag(v) {
  if (v) return '<span class="flag-true">true</span>';
  return '<span class="flag-false">—</span>';
}

function diffCell(v) {
  if (v > 0) return `<span style="color:var(--amber)">+${v}</span>`;
  if (v < 0) return `<span style="color:var(--blue)">${v}</span>`;
  return `<span style="color:var(--sub)">0</span>`;
}

function parseApiUtc(iso) {
  if (iso == null || String(iso).trim() === "") return null;
  const s = String(iso).trim();
  if (s.endsWith("Z") || s.endsWith("z")) return new Date(s);
  if (/[+-]\d{2}:\d{2}$/.test(s) || /[+-]\d{2}:\d{2}:\d{2}$/.test(s)) return new Date(s);
  return new Date(s + "Z");
}

function fmtTime(iso) {
  const d = parseApiUtc(iso);
  if (!d || Number.isNaN(d.getTime())) return iso ? String(iso) : "—";
  return new Intl.DateTimeFormat("ja-JP", {
    timeZone: "Asia/Tokyo",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false,
  }).format(d);
}

function fmtDatetime(iso) {
  const d = parseApiUtc(iso);
  if (!d || Number.isNaN(d.getTime())) return iso ? String(iso) : "—";
  return new Intl.DateTimeFormat("ja-JP", {
    timeZone: "Asia/Tokyo",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit",
    hour12: false,
  }).format(d);
}

function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

// URL パラメータに company_id があれば自動ロード
(function() {
  const p = new URLSearchParams(location.search);
  const c = p.get("company") || p.get("company_id");
  if (c) {
    document.getElementById("company-input").value = c;
    loadLogs();
  }
})();
</script>
</body>
</html>
