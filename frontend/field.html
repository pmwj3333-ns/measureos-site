<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
<title>MEASURE OS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
         background: #f2f2f7; color: #1c1c1e; min-height: 100vh; }

  /* ヘッダー */
  .header { background: #1c1c1e; padding: 14px 20px; display: flex;
            align-items: center; justify-content: space-between; }
  .header-left   { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .header-title { color: #fff; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.05em; }
  .header-hint  { color: rgba(255,255,255,0.45); font-size: 0.65rem; line-height: 1.3; }
  .header-user  {
    color: rgba(255,255,255,0.75); font-size: 0.8rem; cursor: pointer;
    flex-shrink: 0; text-align: right; max-width: 46%; word-break: break-all;
    background: transparent; border: none; font-family: inherit; margin: 0;
    padding: 10px 4px 10px 14px; -webkit-tap-highlight-color: transparent;
    border-radius: 8px; line-height: 1.35;
    text-decoration: underline dotted rgba(255,255,255,0.3);
    text-underline-offset: 3px;
  }
  .header-user:active { opacity: 0.72; }

  /* メインコンテンツ */
  .main { max-width: 480px; margin: 0 auto; padding: 24px 16px 80px; }

  /* カード */
  .card { background: #fff; border-radius: 16px; padding: 24px 20px;
          box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 16px; }
  .card-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
                color: #8e8e93; text-transform: uppercase; margin-bottom: 16px; }

  /* 入力 */
  .input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .input-num  { flex: 1; font-size: 1.5rem; font-weight: 700; border: none;
                border-bottom: 2px solid #e5e5ea; padding: 8px 0; outline: none;
                background: transparent; font-family: inherit; color: #1c1c1e; }
  .input-num:focus { border-bottom-color: #007aff; }
  .input-text { width: 100%; font-size: 1rem; font-weight: 600; border: none;
                border-bottom: 2px solid #e5e5ea; padding: 8px 0; outline: none;
                background: transparent; font-family: inherit; color: #1c1c1e; }
  .input-text:focus { border-bottom-color: #007aff; }
  .input-unit { font-size: 0.9rem; color: #8e8e93; flex-shrink: 0; }
  .field-label { font-size: 0.72rem; font-weight: 600; color: #8e8e93;
                 margin-bottom: 4px; letter-spacing: 0.04em; }
  .readonly-block { background: #f2f2f7; border-radius: 12px; padding: 14px 16px;
                     margin-bottom: 16px; font-size: 0.88rem; line-height: 1.55; }
  .readonly-block .ro-line { display: flex; justify-content: space-between;
                             gap: 12px; padding: 4px 0; border-bottom: 1px solid #e5e5ea; }
  .readonly-block .ro-line:last-child { border-bottom: none; }
  .readonly-block .ro-k { color: #8e8e93; flex-shrink: 0; }
  .readonly-block .ro-v { font-weight: 600; text-align: right; word-break: break-word; }
  .subhead { font-size: 0.7rem; font-weight: 700; color: #636366;
             letter-spacing: 0.06em; margin: 16px 0 10px; }
  .pattern-row { display: flex; flex-direction: column; gap: 10px; margin-top: 14px;
                  padding-top: 14px; border-top: 1px solid #e5e5ea; }
  .pattern-check { display: flex; align-items: flex-start; gap: 10px; font-size: 0.88rem;
                    line-height: 1.45; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .pattern-check input { width: 1.15rem; height: 1.15rem; margin-top: 2px; flex-shrink: 0;
                         accent-color: #007aff; }

  /* ボタン */
  .btn-primary { width: 100%; padding: 16px; background: #007aff; color: #fff;
                 border: none; border-radius: 14px; font-size: 1rem; font-weight: 700;
                 font-family: inherit; cursor: pointer; margin-top: 8px; }
  .btn-primary:disabled { opacity: 0.4; cursor: default; }
  .btn-secondary { width: 100%; padding: 13px; background: #f2f2f7; color: #636366;
                   border: none; border-radius: 14px; font-size: 0.9rem;
                   font-family: inherit; cursor: pointer; margin-top: 8px; }

  /* 複数行入力 */
  .multi-rows { margin-bottom: 4px; }
  .multi-row-line {
    display: flex; align-items: flex-start; gap: 8px; margin-bottom: 12px;
    padding-bottom: 12px; border-bottom: 1px solid #e5e5ea;
  }
  .multi-row-line:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .multi-row-fields { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
  .btn-line-remove {
    flex-shrink: 0; width: 44px; min-height: 44px; align-self: flex-start;
    border: none; background: #f2f2f7; color: #8e8e93; font-size: 1.35rem; line-height: 1;
    border-radius: 10px; cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-line-remove:active { opacity: 0.75; }
  .btn-add-row {
    width: 100%; padding: 12px; margin-top: 10px; background: #fff;
    border: 1.5px dashed #c7c7cc; border-radius: 12px; color: #007aff;
    font-weight: 600; font-size: 0.9rem; cursor: pointer; font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-add-row:active { opacity: 0.85; }
  .readonly-block .ro-v.prelines { white-space: pre-line; text-align: right; }
  .done-val.prelines { white-space: pre-line; }

  /* 補助テキスト */
  .sub-text  { font-size: 0.78rem; color: #8e8e93; margin-top: 8px; line-height: 1.6; }
  .prev-info { font-size: 0.8rem; color: #8e8e93; padding: 10px 0 4px; }
  .started-info { font-size: 0.74rem; color: #34c759; padding-bottom: 12px; }

  /* 完了画面 */
  .done-check { font-size: 3rem; text-align: center; margin-bottom: 8px; }
  .done-title { font-size: 1.1rem; font-weight: 700; text-align: center; margin-bottom: 4px; }
  .done-date  { font-size: 0.8rem; color: #8e8e93; text-align: center; margin-bottom: 20px; }
  .done-row   { display: flex; justify-content: space-between; padding: 8px 0;
                border-bottom: 1px solid #f2f2f7; font-size: 0.9rem; }
  .done-row:last-child { border-bottom: none; }
  .done-val   { font-weight: 700; }

  /* 担当者選択オーバーレイ */
  .overlay { position: fixed; inset: 0; background: #1c1c1e; z-index: 100;
             display: flex; align-items: center; justify-content: center; }
  .overlay.hidden { display: none; }
  .overlay-box { width: 100%; max-width: 360px; padding: 32px 24px;
                 position: relative; overflow: visible; }
  /* 入力＋サジェスト：独立スタックで確定ボタンより手前に重ねる */
  .field-user-stack {
    position: relative;
    z-index: 50;
    isolation: isolate;
    width: 100%;
    margin-bottom: 20px;
  }
  .field-user-input {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 12px;
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    box-sizing: border-box;
  }
  #user-suggest.field-user-suggest {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 6px);
    max-height: min(42vh, 280px);
    overflow-y: auto;
    background: #2c2c2e;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 16px 40px rgba(0,0,0,0.55);
    z-index: 1000;
    display: none;
    -webkit-overflow-scrolling: touch;
  }
  #user-suggest.field-user-suggest.is-open { display: block; }
  .field-user-suggest-item {
    padding: 12px 14px;
    color: #fff;
    font-size: 0.92rem;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .field-user-suggest-item:last-child { border-bottom: none; }
  .field-user-suggest-item:hover { background: rgba(255,255,255,0.08); }
  .overlay-btn {
    position: relative;
    z-index: 0;
    width: 100%;
    padding: 15px;
    background: #007aff;
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }

  /* トースト */
  .toast { position: fixed; bottom: 32px; left: 50%;
           transform: translateX(-50%) translateY(20px);
           background: rgba(28,28,30,0.88); color: #fff;
           padding: 11px 22px; border-radius: 30px; font-size: 0.88rem;
           opacity: 0; transition: opacity 0.2s, transform 0.2s;
           pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 画面 */
  .screen { display: none; }
  .screen.active { display: block; }
</style>
</head>
<body>

<!-- 担当者選択オーバーレイ -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="field-user-stack">
      <input type="text" class="field-user-input" id="user-input" placeholder="担当者名を入力（例: 田中）"
             autocomplete="off"
             onfocus="fieldUserOnFocus()" oninput="fieldUserOnInput()" onblur="fieldUserOnBlur()"
             onkeydown="fieldUserOnKeydown(event)" />
      <div id="user-suggest" class="field-user-suggest" role="listbox" aria-label="班長マスタ候補"></div>
    </div>
    <button type="button" class="overlay-btn" onclick="confirmUser()">この名前で使用する</button>
  </div>
</div>

<!-- ヘッダー -->
<div class="header">
  <div class="header-left">
    <div class="header-title">MEASURE OS</div>
    <div class="header-hint" id="header-hint">担当者名（右上）をタップで変更</div>
  </div>
  <button type="button" class="header-user" id="header-user" onclick="changeUser()"
          aria-label="担当者名を変更">---</button>
</div>

<!-- ================================================
     画面: 実績入力
     ================================================ -->
<div id="screen-actual" class="screen active">
  <div class="main">

    <!-- 前日の予告 -->
    <div id="prev-section" style="display:none;">
      <p class="prev-info" id="prev-info"></p>
    </div>

    <!-- 着手済み表示 -->
    <div class="started-info" id="started-info" style="display:none;"></div>

    <div class="card">
      <div class="card-label">今日の実績</div>
      <div class="subhead">予告（参照）</div>
      <div class="readonly-block" id="actual-planned-summary"></div>
      <div class="subhead">実績（入力）</div>
      <div id="actual-inputs-mfg">
        <div class="field-label">商品名・対象名と数量（複数行可）</div>
        <div id="actual-rows-mfg" class="multi-rows"></div>
        <button type="button" class="btn-add-row" onclick="addActualRow()">＋ 行を追加</button>
      </div>
      <div id="actual-inputs-log" style="display:none;">
        <div class="field-label">作業内容と数量（複数行可）</div>
        <div id="actual-rows-log" class="multi-rows"></div>
        <button type="button" class="btn-add-row" onclick="addActualRow()">＋ 行を追加</button>
      </div>
      <p class="sub-text">予告と違う内容でも、そのまま記録できます。空欄のまま送信も可です。</p>
      <div class="subhead" style="margin-top:16px;">異常の分類（任意）</div>
      <div class="pattern-row">
        <label class="pattern-check">
          <input type="checkbox" id="pattern-a-cb" />
          <span><strong>A</strong> プロセス不備（手順ミス）</span>
        </label>
        <label class="pattern-check">
          <input type="checkbox" id="pattern-b-cb" />
          <span><strong>B</strong> 結果不備（数値ズレ）</span>
        </label>
      </div>
      <button class="btn-primary" id="actual-btn" onclick="submitActual()">実績を記録する</button>
    </div>

  </div>
</div>

<!-- ================================================
     画面: 予告入力
     ================================================ -->
<div id="screen-planned" class="screen">
  <div class="main">
    <div class="card">
      <div class="card-label">明日の予告（任意）</div>
      <div id="planned-block-mfg">
        <div class="field-label">商品名・対象名と数量（予定・複数行可）</div>
        <div id="planned-rows-mfg" class="multi-rows"></div>
        <button type="button" class="btn-add-row" onclick="addPlannedRow()">＋ 行を追加</button>
      </div>
      <div id="planned-block-log" style="display:none;">
        <div class="field-label">作業内容と数量（予定・複数行可）</div>
        <div id="planned-rows-log" class="multi-rows"></div>
        <button type="button" class="btn-add-row" onclick="addPlannedRow()">＋ 行を追加</button>
      </div>
      <p class="field-label" style="margin-top:10px;">単位</p>
      <p class="sub-text" style="margin-top:0;"><span id="planned-unit">個</span>（会社設定）</p>
      <p class="sub-text">候補がなくても入力できます。すべて空欄でもかまいません。</p>
      <button type="button" class="btn-primary" id="planned-btn" onclick="submitPlanned()">予告を記録</button>
      <button type="button" class="btn-primary" id="planned-start-btn" onclick="submitStartFromPlanned()">着手して実績入力へ</button>
    </div>
  </div>
</div>

<!-- ================================================
     画面: 完了
     ================================================ -->
<div id="screen-done" class="screen">
  <div class="main">
    <div class="card">
      <div class="done-check">✓</div>
      <div class="done-title">本日の記録が完了しました</div>
      <div class="done-date" id="done-date"></div>
      <div id="done-rows"></div>
    </div>
    <button class="btn-primary" id="next-day-btn" onclick="startNextDay()">次の営業日を開始する</button>
    <button class="btn-secondary" onclick="backToActual()">内容を修正する</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<datalist id="dl-item-name"></datalist>
<datalist id="dl-work-label"></datalist>

<script>
// =================================================================
// 状態
// =================================================================
let unitId    = null;
let bizDate   = null;   // "YYYY-MM-DD"
let unitVal   = "個";
let inputMode = "manufacturing";   // manufacturing | logistics
let submitting = false;
/** 最後にサーバと整合した予告明細（着手許可の比較用） */
let _plannedSavedFingerprint = "[]";
/** 空明細で「予告を記録」成功直後のみ、着手可 */
let _plannedAllowEmptyAfterSave = false;
/** 担当者サジェスト：field_users 展開後 { name, proc, label } */
let fieldUserSuggestRows = [];
let fieldUserSuggestBlurTimer = null;

const MSG_PLANNED_UNSAVED =
  "予告内容が未保存です。先に「予告を記録」してください。";

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function dispStr(v) {
  if (v == null || String(v).trim() === "") return "—";
  return String(v);
}

function isLogistics() {
  return inputMode === "logistics";
}

function syncInputModeFromPayload(data) {
  if (data && data.input_mode === "logistics") inputMode = "logistics";
  else if (data && data.input_mode) inputMode = "manufacturing";
  applyInputModePanels();
}

function applyInputModePanels() {
  const log = isLogistics();
  const pm = document.getElementById("planned-block-mfg");
  const pl = document.getElementById("planned-block-log");
  const am = document.getElementById("actual-inputs-mfg");
  const al = document.getElementById("actual-inputs-log");
  if (pm) pm.style.display = log ? "none" : "block";
  if (pl) pl.style.display = log ? "block" : "none";
  if (am) am.style.display = log ? "none" : "block";
  if (al) al.style.display = log ? "block" : "none";
}

// ─── 複数行入力（予告・実績） ─────────────────────────────────
function plannedRowsHost() {
  return document.getElementById(isLogistics() ? "planned-rows-log" : "planned-rows-mfg");
}

function actualRowsHost() {
  return document.getElementById(isLogistics() ? "actual-rows-log" : "actual-rows-mfg");
}

function makeInputLineRow(placeholder, listId) {
  const wrap = document.createElement("div");
  wrap.className = "multi-row-line";
  wrap.innerHTML =
    `<div class="multi-row-fields">
       <input class="input-text" type="text" data-line-label="" autocomplete="off" placeholder="" list="" />
       <div class="input-row">
         <input class="input-num" type="number" data-line-qty="" inputmode="decimal" placeholder="数量" min="0" step="any" />
         <span class="input-unit line-unit-suffix"></span>
       </div>
     </div>
     <button type="button" class="btn-line-remove" aria-label="この行を削除">×</button>`;
  const labIn = wrap.querySelector("[data-line-label]");
  labIn.placeholder = placeholder;
  labIn.setAttribute("list", listId);
  wrap.querySelector(".line-unit-suffix").textContent = unitVal;
  wrap.querySelector(".btn-line-remove").addEventListener("click", () => removeInputLineRow(wrap));
  return wrap;
}

function removeInputLineRow(lineEl) {
  const host = lineEl.parentElement;
  if (!host) return;
  const rows = host.querySelectorAll(".multi-row-line");
  if (rows.length <= 1) {
    const a = lineEl.querySelector("[data-line-label]");
    const b = lineEl.querySelector("[data-line-qty]");
    if (a) a.value = "";
    if (b) b.value = "";
    return;
  }
  lineEl.remove();
}

function addPlannedRow() {
  const host = plannedRowsHost();
  if (!host) return;
  const log = isLogistics();
  host.appendChild(makeInputLineRow("候補から選ぶか入力", log ? "dl-work-label" : "dl-item-name"));
}

function addActualRow() {
  const host = actualRowsHost();
  if (!host) return;
  const log = isLogistics();
  host.appendChild(makeInputLineRow("候補から選ぶか入力", log ? "dl-work-label" : "dl-item-name"));
}

function parseQtyInput(raw) {
  const t = String(raw ?? "").trim();
  if (t === "") return null;
  const n = Number(t.replace(",", "."));
  return Number.isFinite(n) ? n : NaN;
}

/** 空行はスキップ。不完全行は { error } */
function scanHostLines(host) {
  if (!host) return { lines: [] };
  const out = [];
  for (const row of host.querySelectorAll(".multi-row-line")) {
    const labEl = row.querySelector("[data-line-label]");
    const qtyEl = row.querySelector("[data-line-qty]");
    const lb = (labEl && labEl.value || "").trim();
    const rawQ = qtyEl ? qtyEl.value : "";
    const q = parseQtyInput(rawQ);
    if (!lb && String(rawQ).trim() === "") continue;
    if (lb && (String(rawQ).trim() === "" || q === null)) {
      return { error: "名前だけ入力された行があります。数量も入力してください" };
    }
    if (!lb && q !== null && !Number.isNaN(q)) {
      return { error: "数量だけ入力された行があります。名前と数量をセットで入力してください" };
    }
    if (Number.isNaN(q)) {
      return { error: "数量の形式が不正な行があります" };
    }
    out.push({ label: lb, value: q });
  }
  return { lines: out };
}

function syncLineUnitSuffixes() {
  document.querySelectorAll(".line-unit-suffix").forEach((el) => {
    el.textContent = unitVal;
  });
}

/** scan / サーバ双方で同一形式の JSON 文字列にそろえる */
function fingerprintPlannedLinesNormalized(lines) {
  const arr = (lines || []).map((L) => {
    const label = String(L.label != null ? L.label : "").trim();
    const value = Number(L.value);
    return { label, value };
  }).filter((x) => x.label && Number.isFinite(x.value));
  return JSON.stringify(arr);
}

function plannedFingerprintFromServerPayload(data) {
  if (!data || typeof data !== "object") return "[]";
  let raw = [];
  if (Array.isArray(data.planned_lines) && data.planned_lines.length) {
    raw = data.planned_lines;
  } else {
    raw = legacyPlannedLinesFromScalars(data);
  }
  return fingerprintPlannedLinesNormalized(raw);
}

function legacyPlannedLinesFromScalars(prefill) {
  const lines = [];
  if (!prefill || typeof prefill !== "object") return lines;
  if (isLogistics()) {
    const lab = (prefill.planned_work_label && String(prefill.planned_work_label).trim())
      ? prefill.planned_work_label
      : (prefill.planned_work_type ? String(prefill.planned_work_type) : "");
    const pv = prefill.planned_value;
    if (lab || pv != null) lines.push({ label: lab || "", value: pv != null ? pv : "" });
  } else {
    const n = (prefill.planned_item_name && String(prefill.planned_item_name).trim()) || "";
    const pv = prefill.planned_value;
    if (n || pv != null) lines.push({ label: n, value: pv != null ? pv : "" });
  }
  return lines;
}

function legacyActualLinesFromScalars(data) {
  const lines = [];
  if (!data || typeof data !== "object") return lines;
  if (isLogistics()) {
    const lab = (data.actual_work_label && String(data.actual_work_label).trim())
      ? data.actual_work_label
      : (data.actual_work_type ? String(data.actual_work_type) : "");
    const av = data.actual_value;
    if (lab || av != null) lines.push({ label: lab || "", value: av != null ? av : "" });
  } else {
    const n = (data.actual_item_name && String(data.actual_item_name).trim()) || "";
    const av = data.actual_value;
    if (n || av != null) lines.push({ label: n, value: av != null ? av : "" });
  }
  return lines;
}

function fillRowsHost(host, lineObjs, placeholder, listId) {
  if (!host) return;
  host.innerHTML = "";
  const src = (lineObjs && lineObjs.length) ? lineObjs : [{}];
  for (const L of src) {
    const row = makeInputLineRow(placeholder, listId);
    const lab = L.label != null ? String(L.label) : "";
    const v = L.value;
    row.querySelector("[data-line-label]").value = lab;
    row.querySelector("[data-line-qty]").value =
      v !== null && v !== undefined && String(v).trim() !== "" ? String(v) : "";
    host.appendChild(row);
  }
  syncLineUnitSuffixes();
}

function setActualRowsFromData(data) {

function renderPlannedSummaryForActual(data) {

      `<div class="ro-line"><span class="ro-k">数量</span><span class="ro-v">${escHtml(qv(data.planned_value))}</span></div>`;

function hasWorkPlanned(data) {
  if (!data) return false;
  if (data.planned_lines && data.planned_lines.length > 0) return true;
  return data.planned_value != null
    || (data.planned_work_type && String(data.planned_work_type).trim() !== "")
    || (data.planned_work_label && String(data.planned_work_label).trim() !== "")
    || (data.planned_item_name && String(data.planned_item_name).trim() !== "");
}

async function loadCompanyInputMode() {

    }

/** 物流モード: 作業ラベル列、なければ旧作業種別列（移行前データ用） */
function logisticsPlannedLabel(d) {
  const a = d.planned_work_label && String(d.planned_work_label).trim();
  if (a) return d.planned_work_label;
  const b = d.planned_work_type && String(d.planned_work_type).trim();
  return b ? d.planned_work_type : null;
}

function logisticsActualLabel(d) {
  const a = d.actual_work_label && String(d.actual_work_label).trim();
  if (a) return d.actual_work_label;
  const b = d.actual_work_type && String(d.actual_work_type).trim();
  return b ? d.actual_work_type : null;
}

/**
 * 表示用の連結ラベル（例: 902c · 3000s）を単一候補に分解。
 * 区切り: 中黒 U+00B7 / 全角中黒 U+30FB、およびスラッシュ。
 */
function splitSuggestionLabels(raw) {
  if (raw == null) return [];
  const s = String(raw).trim();
  if (!s) return [];
  const sep = "\x01";
  const normalized = s
    .replace(/\s*[\u00B7\u30FB]\s*/g, sep)
    .replace(/\s*\/\s*/g, sep);
  const parts = normalized.split(sep).map((p) => p.trim()).filter(Boolean);
  return parts.length ? parts : [s];
}

function addSuggestionTokens(targetSet, raw) {
  for (const piece of splitSuggestionLabels(raw)) {
    if (piece) targetSet.add(piece);
  }
}

async function fillDatalistsFromWorkList() {
  const cfg = getConfig();
  try {
    const res = await fetch(`/work/list?company_id=${encodeURIComponent(cfg.company)}`);
    if (!res.ok) return;
    const rows = await res.json();
    const nm = new Set();
    const wl = new Set();
    for (const r of rows) {
      addSuggestionTokens(nm, r.planned_item_name);
      addSuggestionTokens(nm, r.actual_item_name);
      addSuggestionTokens(wl, r.planned_work_label);
      addSuggestionTokens(wl, r.actual_work_label);
      addSuggestionTokens(wl, r.planned_work_type);
      addSuggestionTokens(wl, r.actual_work_type);
      for (const x of r.planned_lines || []) {
        if (x && x.label) {
          const lb = String(x.label).trim();
          if (lb) {
            nm.add(lb);
            wl.add(lb);
          }
        }
      }
      for (const x of r.actual_lines || []) {
        if (x && x.label) {
          const lb = String(x.label).trim();
          if (lb) {
            nm.add(lb);
            wl.add(lb);
          }
        }
      }
    }
    const fillDl = (id, set) => {
      const el = document.getElementById(id);
      if (!el) return;
      el.innerHTML = "";
      [...set].sort().slice(0, 80).forEach((v) => {
        const o = document.createElement("option");
        o.value = v;
        el.appendChild(o);
      });
    };
    fillDl("dl-item-name", nm);
    fillDl("dl-work-label", wl);
  } catch (_) { /* 候補なしでも入力可 */ }
}

// =================================================================
function param(key, fallback) {
  const v = new URLSearchParams(location.search).get(key);
  if (v === null || v === "") return fallback;
  return v;
}

function getConfig() {
  return {
    company:  param("company_id", null) || param("company", "company_a"),
    task:     param("task_id", null)     || param("task", "task_01"),
    process:  param("process_id", null)  || param("process", "proc_01"),
    user:     localStorage.getItem("mo_user") || "",
  };
}

// =================================================================
// 担当者入力＋サジェスト（field_users のみ・班長ボタン一覧なし）
// =================================================================

const FIELD_USER_SUGGEST_LIMIT = 12;

function fieldUserParseSegment(segment) {
  const s = String(segment).trim();
  if (!s) return { name: "", proc: "" };
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === ":" || ch === "：") {
      return { name: s.slice(0, i).trim(), proc: s.slice(i + 1).trim() };
    }
  }
  return { name: s, proc: "" };
}

function fieldUserBuildLabel(name, proc) {
  const n = String(name || "").trim();
  const p = String(proc || "").trim();
  if (!n) return "";
  return p ? `${n}（${p}）` : n;
}

/** 入力文字列からサーバ送信用 name と mo_leader_proc 用 proc を決定（マスタ一致時のみ proc あり） */
function fieldUserResolveForCommit(rawInput) {
  const v = String(rawInput || "").trim();
  if (!v) return { name: "", proc: "" };
  for (const r of fieldUserSuggestRows) {
    if (v === r.label) return { name: r.name, proc: (r.proc || "").trim() };
  }
  const sameName = fieldUserSuggestRows.filter((r) => v === r.name);
  if (sameName.length === 1) {
    return { name: sameName[0].name, proc: (sameName[0].proc || "").trim() };
  }
  if (sameName.length > 1) {
    const saved = (localStorage.getItem("mo_leader_proc") || "").trim();
    const hit = sameName.find((r) => (r.proc || "").trim() === saved);
    if (hit) return { name: hit.name, proc: (hit.proc || "").trim() };
    return {
      name: sameName[0].name,
      proc: (sameName[0].proc || "").trim(),
    };
  }
  return { name: v, proc: "" };
}

/** オーバーレイ：前回確定の name / mo_leader_proc から見た目用の文字列 */
function fieldUserOverlayPrefill() {
  const name = localStorage.getItem("mo_user") || "";
  const proc = (localStorage.getItem("mo_leader_proc") || "").trim();
  if (!name) return "";
  return proc ? fieldUserBuildLabel(name, proc) : name;
}

function fieldUserParseFieldUsersRaw(raw) {
  const rows = [];
  if (!raw || !String(raw).trim()) return rows;
  for (const part of String(raw).split(",")) {
    const { name, proc } = fieldUserParseSegment(part);
    if (name) rows.push({ name, proc, label: fieldUserBuildLabel(name, proc) });
  }
  return rows;
}

/** 画面表示時：GET /settings/{company_id} で field_users を取得 */
async function fieldUserFetchMaster() {
  const companyId = getConfig().company;
  try {
    const res = await fetch(`/settings/${encodeURIComponent(companyId)}`);
    if (!res.ok) fieldUserSuggestRows = [];
    else {
      const data = await res.json();
      fieldUserSuggestRows = fieldUserParseFieldUsersRaw(data.field_users || "");
    }
  } catch (_) {
    fieldUserSuggestRows = [];
  }
  const input = document.getElementById("user-input");
  if (input && document.activeElement === input) fieldUserSuggestRefresh();
}

function fieldUserSuggestClose() {
  const el = document.getElementById("user-suggest");
  if (!el) return;
  el.classList.remove("is-open");
  el.innerHTML = "";
}

function fieldUserSuggestRefresh() {
  const input = document.getElementById("user-input");
  const box = document.getElementById("user-suggest");
  if (!input || !box) return;

  const q = input.value.trim();
  let list;
  if (!q) {
    list = fieldUserSuggestRows.slice(0, FIELD_USER_SUGGEST_LIMIT);
  } else {
    const ql = q.toLowerCase();
    list = fieldUserSuggestRows
      .filter(
        (r) =>
          r.name.toLowerCase().includes(ql) ||
          r.label.toLowerCase().includes(ql)
      )
      .slice(0, FIELD_USER_SUGGEST_LIMIT);
  }

  if (!list.length) {
    fieldUserSuggestClose();
    return;
  }

  box.innerHTML = "";
  for (const r of list) {
    const item = document.createElement("div");
    item.className = "field-user-suggest-item";
    item.setAttribute("role", "option");
    item.textContent = r.label;
    item.addEventListener("mousedown", (e) => {
      e.preventDefault();
      fieldUserOnPick(r);
    });
    box.appendChild(item);
  }
  box.classList.add("is-open");
}

function fieldUserOnPick(r) {
  const input = document.getElementById("user-input");
  if (input) input.value = r.label;
  fieldUserSuggestClose();
  if (input) input.focus();
}

function fieldUserOnFocus() {
  clearTimeout(fieldUserSuggestBlurTimer);
  fieldUserSuggestRefresh();
}

function fieldUserOnInput() {
  fieldUserSuggestRefresh();
}

function fieldUserOnBlur() {
  clearTimeout(fieldUserSuggestBlurTimer);
  fieldUserSuggestBlurTimer = setTimeout(fieldUserSuggestClose, 220);
}

function fieldUserOnKeydown(ev) {
  if (ev.key === "Backspace" || ev.key === "Delete") {
    const input = document.getElementById("user-input");
    if (!input || ev.target !== input) return;
    const v = input.value;
    if (v.includes("（") && v.includes("）")) {
      ev.preventDefault();
      input.value = "";
      fieldUserSuggestRefresh();
      return;
    }
  }
  if (ev.key === "Escape") {
    fieldUserSuggestClose();
    return;
  }
  if (ev.key === "Enter") confirmUser();
}

function confirmUser() {
  fieldUserSuggestClose();
  const raw = document.getElementById("user-input").value.trim();
  if (!raw) { toast("名前を入力してください"); return; }
  const { name, proc } = fieldUserResolveForCommit(raw);
  if (!name) { toast("名前を入力してください"); return; }
  localStorage.setItem("mo_user", name);
  if (proc) localStorage.setItem("mo_leader_proc", proc);
  else localStorage.removeItem("mo_leader_proc");
  document.getElementById("overlay").classList.add("hidden");
  document.getElementById("header-user").textContent = name;
  init();
}

function changeUser() {
  document.getElementById("user-input").value = fieldUserOverlayPrefill();
  document.getElementById("overlay").classList.remove("hidden");
  fieldUserFetchMaster().then(() => fieldUserSuggestRefresh());
  setTimeout(() => document.getElementById("user-input").focus(), 100);
}

// =================================================================
// 初期化
// =================================================================
async function init() {
  const cfg  = getConfig();
  if (!cfg.user) { return; }
  document.getElementById("header-user").textContent = cfg.user;
  await loadCompanyInputMode();

  let data = await api("POST", "/work", {
    company_id: cfg.company, task_id: cfg.task,
    process_id: cfg.process, user_id: cfg.user,
  });
  if (!data || data.__error) {
    toast(data && data.message ? data.message : "読み込みに失敗しました");
    return;
  }

  syncInputModeFromPayload(data);
  applyUnit(data.unit);
  unitId  = data.id;
  bizDate = data.business_date;

  // 実績まで終わっている → 次営業日は画面だけ先に進める（行は予告/着手まで作らない）
  if (data.actual_at) {
    const nx = await fetchNextBusinessDate(data.business_date);
    if (nx && nx.business_date) {
      bizDate = nx.business_date;
      unitId  = null;
      applyUnit(data.unit);
      await showPlanned();
      return;
    }
    showDone(data);
    return;
  }

  // 予告 → 着手 → 実績 のどこから再開するか（予告済みでも自動着手しない）
  if (!data.started_at && !data.actual_at) {
    if (hasWorkPlanned(data)) {
      await showPlanned(data);
      return;
    }
    await showPlanned();
    return;
  }
  await showActual(data);
}

function show(name) {

    document.getElementById(`screen-${n}`).classList.toggle("active", n === name);
  });
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function applyUnit(u) {
  unitVal = u || "個";
  const pu = document.getElementById("planned-unit");
  if (pu) pu.textContent = unitVal;
  syncLineUnitSuffixes();
}

async function showActual(data) {
  syncInputModeFromPayload(data);
  await fillDatalistsFromWorkList();

  // 前日予告の表示
  const prevSec  = document.getElementById("prev-section");
  const prevInfo = document.getElementById("prev-info");
  const ppl = data.prev_planned_lines;
  const hasPrev = (ppl && ppl.length > 0)
    || data.prev_planned_value != null
    || (data.prev_planned_work_type && String(data.prev_planned_work_type).trim() !== "")
    || (data.prev_planned_work_label && String(data.prev_planned_work_label).trim() !== "")
    || (data.prev_planned_item_name && String(data.prev_planned_item_name).trim() !== "");
  if (hasPrev) {
    const parts = [];
    if (ppl && ppl.length) {
      prevInfo.classList.add("prelines");
      prevInfo.style.whiteSpace = "pre-line";
      prevInfo.textContent = "前日の予告：\n" + ppl.map((l) =>
        `${l.label}　${l.value} ${unitVal}`).join("\n");
    } else {
      prevInfo.classList.remove("prelines");
      prevInfo.style.whiteSpace = "";
      if (isLogistics()) {
        const plab = data.prev_planned_work_label && String(data.prev_planned_work_label).trim()
          ? data.prev_planned_work_label
          : (data.prev_planned_work_type && String(data.prev_planned_work_type).trim()
            ? data.prev_planned_work_type : null);
        if (plab) parts.push(`作業：${plab}`);
        if (data.prev_planned_value != null)
          parts.push(`数量：${data.prev_planned_value} ${unitVal}`);
      } else {
        if (data.prev_planned_item_name && String(data.prev_planned_item_name).trim())
          parts.push(`商品：${data.prev_planned_item_name}`);
        if (data.prev_planned_value != null)
          parts.push(`数量：${data.prev_planned_value} ${unitVal}`);
      }
      prevInfo.textContent = "前日の予告：" + (parts.length ? parts.join(" / ") : "—");
    }
    prevSec.style.display = "block";
  } else {
    prevSec.style.display = "none";
  }

  // 当日の予告（参照）
  renderPlannedSummaryForActual(data);

  // 着手済み表示
  const stInfo = document.getElementById("started-info");
  if (data.started_at) {
    const t = toJST(data.started_at);
    stInfo.textContent  = `着手済み ✓  ${t}`;
    stInfo.style.display = "block";
  } else {
    stInfo.style.display = "none";
  }

  // 実績フォーム
  setActualRowsFromData(data);
  document.getElementById("pattern-a-cb").checked = data.pattern_a === true;
  document.getElementById("pattern-b-cb").checked = data.pattern_b === true;
  const btn = document.getElementById("actual-btn");
  btn.textContent = "実績を記録する";
  btn.disabled    = false;
  submitting      = false;

  show("actual");
}

async function showPlanned(prefill) {
  await loadCompanyInputMode();
  if (prefill && typeof prefill === "object") syncInputModeFromPayload(prefill);
  await fillDatalistsFromWorkList();
  if (prefill && typeof prefill === "object") {
    setPlannedRowsFromData(prefill);
  } else {
    setPlannedRowsFromData(null);
  }
  const btn = document.getElementById("planned-btn");
  btn.textContent = "予告を記録";
  btn.disabled    = false;
  const sbtn = document.getElementById("planned-start-btn");
  if (sbtn) {
    sbtn.disabled    = false;
    sbtn.textContent = "着手して実績入力へ";
  }

}

function showDone(data) {
  syncInputModeFromPayload(data);
  bizDate = data.business_date;
  document.getElementById("done-date").textContent = `営業日：${data.business_date}`;

  function plannedDoneText() {
    if (data.planned_lines && data.planned_lines.length) {
      return data.planned_lines.map((l) => `${l.label}　${l.value} ${unitVal}`).join("\n");
    }
    if (isLogistics()) {
      const a = dispStr(logisticsPlannedLabel(data));
      const b = data.planned_value != null ? `${data.planned_value} ${unitVal}` : "—";
      return `作業：${a}\n数量：${b}`;
    }
    const a = dispStr(data.planned_item_name);
    const b = data.planned_value != null ? `${data.planned_value} ${unitVal}` : "—";
    return `商品：${a}\n数量：${b}`;
  }

  function actualDoneText() {
    if (data.actual_lines && data.actual_lines.length) {
      return data.actual_lines.map((l) => `${l.label}　${l.value} ${unitVal}`).join("\n");
    }
    if (isLogistics()) {
      const a = dispStr(logisticsActualLabel(data));
      const b = data.actual_value != null ? `${data.actual_value} ${unitVal}` : "未入力";
      return `作業：${a}\n数量：${b}`;
    }
    const a = dispStr(data.actual_item_name);
    const b = data.actual_value != null ? `${data.actual_value} ${unitVal}` : "未入力";
    return `商品：${a}\n数量：${b}`;
  }

  const rows = [
    { label: "【予告】", value: escHtml(plannedDoneText()), pre: true },
    { label: "【実績】", value: escHtml(actualDoneText()), pre: true },
    { label: "差分（数量）", value: escHtml(data.diff_value != null ? `${data.diff_value} ${unitVal}` : "—"), pre: false },
    { label: "着手時刻", value: escHtml(data.started_at ? toJST(data.started_at) : "未記録"), pre: false },
  ];

  document.getElementById("done-rows").innerHTML = rows.map((r) =>
    `<div class="done-row"><span>${r.label}</span><span class="done-val${r.pre ? " prelines" : ""}">${r.value}</span></div>`
  ).join("");

  const nb = document.getElementById("next-day-btn");
  nb.textContent = "次の営業日を開始する";
  nb.disabled    = false;

  show("done");
}

// =================================================================
// 実績送信
// =================================================================
async function submitActual() {
  if (submitting) return;
  submitting = true;
  const btn = document.getElementById("actual-btn");
  btn.disabled    = true;
  btn.textContent = "記録中...";
  const cfgCompany = getConfig().company;
  const uidStr = unitId != null ? String(unitId) : "（不明）";

  const scanned = scanHostLines(actualRowsHost());
  if (scanned.error) {
    toast(
      "保存失敗: status=送信前, detail=" + scanned.error,
      10000,
    );
    btn.disabled    = false;
    btn.textContent = "実績を記録する";
    submitting = false;
    return;
  }
  const bChecked = document.getElementById("pattern-b-cb").checked;
  const payload = {
    lines: scanned.lines,
    actual_work_type: null,
    actual_work_label: null,
    actual_item_name: null,
    actual_value: null,
    pattern_a: document.getElementById("pattern-a-cb").checked,
    pattern_b: bChecked,
    user_pattern: bChecked ? "B" : null,
  };
  if (unitId == null || unitId === "" || !Number.isFinite(Number(unitId))) {
    toast(
      "保存失敗: status=送信前, detail=作業記録の番号（unitId）がありません。ページを再読み込みしてください",
      10000,
    );
    btn.disabled = false;
    btn.textContent = "実績を記録する";
    submitting = false;
    return;
  }

  const url = `/work/${unitId}/actual`;

  let data = null;
  let httpStatus = "—";
  let failureDetail = "不明なエラー";
  try {
    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    httpStatus = String(res.status);
    const text = await res.text();
    let parsed = null;
    try {
      parsed = text ? JSON.parse(text) : null;
    } catch (_) {
      parsed = null;
    }
    if (!res.ok) {
      failureDetail =
        detailFromApiError(parsed, text ? text.slice(0, 180) : "サーバーがエラーを返しました");
      data = { __error: true };
    } else {
      data = parsed;
    }
  } catch (e) {
    httpStatus = "—";
    failureDetail =
      e && e.message ? String(e.message) : "通信エラー（サーバーに届いていない可能性があります）";
    data = null;
  }

  if (!data || data.__error) {
    btn.disabled    = false;
    btn.textContent = "実績を記録する";
    submitting = false;
    toast(
      "保存失敗: status=" + httpStatus + ", detail=" + failureDetail,
      10000,
    );
    return;
  }

  toast(
    "保存成功: company_id=" + cfgCompany + ", unitId=" + uidStr,
    10000,
  );
  const nextD = data.next_business_date
    || (await fetchNextBusinessDate(data.business_date))?.business_date;
  if (!nextD) {
    toast("次の営業日へ進めませんでした");
    setTimeout(() => showDone(data), 500);
    submitting = false;
    btn.disabled    = false;
    btn.textContent = "実績を記録する";
    return;
  }
  applyUnit(data.unit);
  bizDate = nextD;
  unitId  = null;
  btn.disabled    = false;
  btn.textContent = "実績を記録する";
  setTimeout(() => { void showPlanned(); }, 500);
  submitting = false;
}

// =================================================================
// 予告送信
// =================================================================
async function submitPlanned() {
  const btn = document.getElementById("planned-btn");
  btn.disabled    = true;
  btn.textContent = "記録中...";

  const cfg = getConfig();
  let id = unitId;
  if ((id == null || id === "") && bizDate) {
    const w = await api("POST", "/work", {
      company_id:    cfg.company,
      task_id:       cfg.task,
      process_id:    cfg.process,
      user_id:       cfg.user,
      business_date: bizDate,
    });
    if (!w || w.__error || !w.id) {
      btn.disabled    = false;
      btn.textContent = "予告を記録";
      toast(w && w.message ? w.message : "作業記録の準備に失敗しました");
      return;
    }
    unitId = w.id;
    id     = w.id;
    syncInputModeFromPayload(w);
  }
  if (!id) {
    btn.disabled    = false;
    btn.textContent = "予告を記録";
    toast("営業日が不明です");
    return;
  }

  const scanned = scanHostLines(plannedRowsHost());
  if (scanned.error) {
    toast(scanned.error);
    btn.disabled    = false;
    btn.textContent = "予告を記録";
    return;
  }
  const plannedBody = {
    lines: scanned.lines,
    planned_work_type: null,
    planned_work_label: null,
    planned_item_name: null,
    planned_value: null,
  };
  const data = await api("POST", `/work/${id}/planned`, plannedBody);

  if (!data || data.__error) {
    btn.disabled    = false;
    btn.textContent = "予告を記録";
    toast(data && data.message ? data.message : "送信に失敗しました");
    return;
  }

  unitId = data.id;
  applyUnit(data.unit);
  syncInputModeFromPayload(data);
  toast("予告を保存しました");
  btn.disabled    = false;
  btn.textContent = "予告を記録";
  const sbtn = document.getElementById("planned-start-btn");
  if (sbtn) {
    sbtn.disabled    = false;
    sbtn.textContent = "着手して実績入力へ";
  }
  setPlannedRowsFromData(data);
  if (plannedFingerprintFromServerPayload(data) === "[]") {
    _plannedAllowEmptyAfterSave = true;
  } else {
    _plannedAllowEmptyAfterSave = false;
  }
  show("planned");
}

async function submitStartFromPlanned() {
  const sbtn = document.getElementById("planned-start-btn");
  const host = plannedRowsHost();
  const scanned = scanHostLines(host);
  if (scanned.error) {
    toast(MSG_PLANNED_UNSAVED);
    return;
  }
  const currentFp = fingerprintPlannedLinesNormalized(scanned.lines);
  if (currentFp === "[]" && !_plannedAllowEmptyAfterSave) {
    toast("予告が確定していません。先に「予告を記録」してください。空でも保存できます。");
    return;
  }
  if (currentFp !== _plannedSavedFingerprint) {
    toast(MSG_PLANNED_UNSAVED);
    return;
  }

  sbtn.disabled    = true;
  sbtn.textContent = "着手中...";

  const cfg = getConfig();
  let id = unitId;
  try {
    if ((id == null || id === "") && bizDate) {
      const w = await api("POST", "/work", {
        company_id:    cfg.company,
        task_id:       cfg.task,
        process_id:    cfg.process,
        user_id:       cfg.user,
        business_date: bizDate,
      });
      if (!w || w.__error || !w.id) {
        toast(w && w.message ? w.message : "作業記録の準備に失敗しました");
        return;
      }
      unitId = w.id;
      id     = w.id;
      syncInputModeFromPayload(w);
    }
    if (!id) {
      toast("営業日が不明です");
      return;
    }

    const st = await api("POST", `/work/${id}/start`, {});
    let row = (st && !st.__error) ? st : null;
    if (!row) {
      row = await api("POST", "/work", {
        company_id:    cfg.company,
        task_id:       cfg.task,
        process_id:    cfg.process,
        user_id:       cfg.user,
        business_date: bizDate || undefined,
      });
    }
    if (!row || row.__error || !row.id) {
      toast(row && row.message ? row.message : "着手に失敗しました");
      return;
    }
    applyUnit(row.unit);
    syncInputModeFromPayload(row);
    _plannedAllowEmptyAfterSave = false;
    toast("着手を記録しました");
    await showActual(row);
  } finally {
    sbtn.disabled    = false;
    sbtn.textContent = "着手して実績入力へ";
  }
}

// =================================================================
// 次の営業日
// =================================================================
async function startNextDay() {
  if (!bizDate) return;
  const btn = document.getElementById("next-day-btn");
  btn.disabled    = true;
  btn.textContent = "開始中...";

  const nx = await fetchNextBusinessDate(bizDate);
  if (!nx || !nx.business_date) {
    btn.disabled    = false;
    btn.textContent = "次の営業日を開始する";
    toast("開始に失敗しました");
    return;
  }

  unitId  = null;
  bizDate = nx.business_date;
  btn.disabled    = false;
  btn.textContent = "次の営業日を開始する";
  toast("次の作業を開始しました");
  setTimeout(() => { void showPlanned(); }, 400);
}

function backToActual() {
  show("actual");
}

// =================================================================
// ユーティリティ
// =================================================================
async function api(method, path, body = null) {
  try {
    const res = await fetch(path, {
      method,
      headers: { "Content-Type": "application/json" },
      body: body && method !== "GET" ? JSON.stringify(body) : undefined,
    });
    const data = await res.json();
    if (!res.ok) {
      let msg = "送信に失敗しました";
      const d = data.detail;
      if (typeof d === "string") msg = d;
      else if (Array.isArray(d) && d.length && d[0].msg) msg = String(d[0].msg);
      return { __error: true, message: msg };
    }
    return data;
  } catch {
    return null;
  }
}

async function fetchNextBusinessDate(currentBizDate) {
  const cfg = getConfig();
  const q = new URLSearchParams({
    company_id: cfg.company,
    current_business_date: currentBizDate,
  });
  try {
    const res = await fetch(`/work/next-business-date?${q}`);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

/** API 日時: TZ なしは UTC。debug / 現場表示を Asia/Tokyo に統一 */
function parseApiUtc(iso) {
  if (iso == null || String(iso).trim() === "") return null;
  const s = String(iso).trim();
  if (s.endsWith("Z") || s.endsWith("z")) return new Date(s);
  if (/[+-]\d{2}:\d{2}$/.test(s) || /[+-]\d{2}:\d{2}:\d{2}$/.test(s)) return new Date(s);
  return new Date(s + "Z");
}

function toJST(isoStr) {
  if (!isoStr) return "—";
  const d = parseApiUtc(isoStr);
  if (!d || Number.isNaN(d.getTime())) return String(isoStr);
  return new Intl.DateTimeFormat("ja-JP", {
    timeZone: "Asia/Tokyo",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false,
  }).format(d);
}

function toast(msg, durationMs) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  const ms = typeof durationMs === "number" && durationMs > 0 ? durationMs : 2400;
  setTimeout(() => el.classList.remove("show"), ms);
}

/** API のエラー JSON から人が読める一文を取り出す */
function detailFromApiError(parsed, fallback) {
  if (!parsed || typeof parsed !== "object") return fallback;
  const d = parsed.detail;
  if (typeof d === "string") return d;
  if (Array.isArray(d) && d.length && d[0] && d[0].msg) return String(d[0].msg);
  try {
    return JSON.stringify(parsed).slice(0, 200);
  } catch (_) {
    return fallback;
  }
}
