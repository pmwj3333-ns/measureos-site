<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <title>MEASURE OS｜班長マスタ（v2）</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Meiryo", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      line-height: 1.5;
    }
    header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 18px 20px;
      border-bottom: 1px solid #334155;
    }
    header h1 { font-size: 1.05rem; font-weight: 700; }
    .badge {
      display: inline-block;
      margin-top: 6px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #38bdf8;
      text-transform: uppercase;
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 20px 18px 40px;
    }
    .layout-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 24px;
      align-items: stretch;
    }
    @media (max-width: 900px) {
      .layout-top {
        grid-template-columns: 1fr;
        margin-bottom: 20px;
      }
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 14px;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.35), 0 8px 28px rgba(0, 0, 0, 0.18);
    }
    .layout-top .card {
      margin-bottom: 0;
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .card-leaders {
      margin-bottom: 0;
      margin-top: 0;
      padding-top: 18px;
      border-top: 1px solid rgba(51, 65, 85, 0.65);
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.35), 0 10px 32px rgba(0, 0, 0, 0.2);
    }
    .card-rules {
      flex: 1;
    }
    .rules-block + .rules-block {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(71, 85, 105, 0.75);
    }
    .rules-block h2 {
      font-size: 0.92rem;
      margin-bottom: 10px;
      letter-spacing: 0.02em;
      color: #f1f5f9;
    }
    .card h2 { font-size: 0.95rem; margin-bottom: 10px; color: #f8fafc; }
    label { display: block; font-size: 0.75rem; color: #94a3b8; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input[type="number"] {
      width: 100%;
      max-width: 160px;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 0.95rem;
      font-family: inherit;
    }
    input[type="number"]:focus { outline: none; border-color: #38bdf8; }
    input:focus { outline: none; border-color: #38bdf8; }
    select {
      width: 100%;
      max-width: 420px;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
    }
    select:focus { outline: none; border-color: #38bdf8; }
    .row-line {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 6px 8px;
      align-items: center;
      margin-bottom: 5px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(51, 65, 85, 0.4);
    }
    .row-line label {
      font-size: 0.6875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      color: #94a3b8;
      opacity: 0.88;
      margin-bottom: 4px;
    }
    .row-line input[type="text"] {
      padding: 9px 10px;
      font-size: 0.9rem;
      border-radius: 9px;
    }
    .row-line:last-of-type {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    @media (max-width: 520px) {
      .row-line { grid-template-columns: 1fr; }
    }
    .btn-remove {
      border: none;
      background: #334155;
      color: #94a3b8;
      width: 36px;
      height: 36px;
      border-radius: 9px;
      cursor: pointer;
      font-size: 1.05rem;
      justify-self: end;
    }
    .btn-row {
      width: 100%;
      padding: 10px 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px dashed #475569;
      background: transparent;
      color: #38bdf8;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      font-family: inherit;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .card-leaders .actions {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(51, 65, 85, 0.5);
    }
    .btn-primary {
      flex: 1;
      min-width: 140px;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      background: #0ea5e9;
      color: #fff;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-secondary {
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #475569;
      background: #334155;
      color: #e2e8f0;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: inherit;
    }
    .msg {
      margin-top: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      line-height: 1.45;
      display: none;
    }
    .msg.ok {
      display: block;
      color: #94d4b8;
      background: rgba(16, 185, 129, 0.045);
      border: 1px solid rgba(52, 211, 153, 0.16);
    }
    .msg.ng {
      display: block;
      color: #f0b4b4;
      background: rgba(248, 113, 113, 0.055);
      border: 1px solid rgba(248, 113, 113, 0.22);
    }
    .hint { font-size: 0.78rem; color: #64748b; margin-top: 10px; line-height: 1.5; }
    .card-leaders > .hint {
      margin-top: 12px;
      padding-top: 2px;
    }
    .hint a { color: #38bdf8; }
    .label-block { margin-top: 4px; margin-bottom: 9px; }
    .label-after-gap { margin-top: 12px; }
    .work-mode-fieldset {
      border: none;
      padding: 0;
      margin: 0 0 8px 0;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .work-mode-fieldset label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #e2e8f0;
      margin-bottom: 0;
    }
    .work-mode-fieldset input[type="radio"] {
      accent-color: #0ea5e9;
      width: 1.05rem;
      height: 1.05rem;
    }
    .boundary-preview {
      font-size: 0.82rem;
      color: #94a3b8;
      margin-top: 8px;
    }
    .boundary-preview strong {
      color: #38bdf8;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .boundary-mismatch {
      margin-top: 8px;
      color: #fbbf24;
    }
  </style>
</head>
<body>
  <header>
    <h1>班長マスタ登録</h1>
    <span class="badge">フェーズ1 · v2 専用（旧 sr.html 不使用）</span>
  </header>
  <div class="wrap">
    <div class="layout-top">
      <div class="card">
        <h2>会社（company_id）</h2>
        <label for="company-id">company_id</label>
        <input type="text" id="company-id" placeholder="例: x" autocomplete="off" />
        <label for="company_name" class="label-after-gap">会社名</label>
        <input
          type="text"
          id="company_name"
          placeholder="例：株式会社サンプル"
          autocomplete="organization"
        />
        <label for="package_code" class="label-after-gap">Package</label>
        <select id="package_code" aria-label="Package">
          <option value="A">A — &#35352;&#37682;&#22522;&#30436;</option>
          <option value="B">B — &#36939;&#29992;&#21487;&#35222;&#21270;</option>
          <option value="C">C — &#32113;&#21046;&#12539;&#24375;&#21046;</option>
          <option value="D">D — &#32076;&#21942;&#27963;&#29992;</option>
        </select>
        <p class="hint" style="margin-top:8px;">
          &#22865;&#32004;&#12503;&#12521;&#12531;&#12395;&#24540;&#12376;&#12383;&#27231;&#33021;&#24133;&#12391;&#12377;&#65288;&#26465;&#25991;&#12539;&#12501;&#12455;&#12540;&#12474;&#30058;&#21495;&#12399;&#34920;&#31034;&#12375;&#12414;&#12379;&#12435;&#65289;&#12290;
        </p>
      </div>
      <div class="card card-rules">
        <div class="rules-block">
          <h2>業務日切替設定</h2>
          <label class="label-block" for="wm-day">勤務形態</label>
          <fieldset class="work-mode-fieldset" aria-label="勤務形態">
            <label for="wm-day">
              <input type="radio" name="work-mode" id="wm-day" value="day" checked />
              日勤
            </label>
            <label for="wm-night">
              <input type="radio" name="work-mode" id="wm-night" value="night" />
              夜勤
            </label>
            <label for="wm-24h">
              <input type="radio" name="work-mode" id="wm-24h" value="h24" />
              24時間稼働
            </label>
          </fieldset>
          <p class="hint">
            業務日をどの時刻で切り替えるかを決めます（深夜作業を前日扱いにするための設定）
          </p>
          <p class="boundary-preview">
            業務日切替時刻：<strong id="boundary-preview-time">05:00</strong>
          </p>
          <p id="boundary-mismatch" class="hint boundary-mismatch" hidden></p>
        </div>
        <div class="rules-block">
          <h2>異常判定設定</h2>
          <label for="tolerance_value">許容差（±）</label>
          <input
            type="number"
            id="tolerance_value"
            min="0"
            step="1"
            placeholder="2"
            inputmode="numeric"
            autocomplete="off"
          />
          <p class="hint">
            予告と実績の差がこの値を超えると、数値乖離として判定します
          </p>
        </div>
      </div>
    </div>
    <div class="card card-leaders">
      <h2>班長リスト（名前＋工程）</h2>
      <div id="lines"></div>
      <button type="button" class="btn-row" id="btn-add">＋ 行を追加</button>
      <div class="actions">
        <button type="button" class="btn-primary" id="btn-save">保存する</button>
        <button type="button" class="btn-secondary" id="btn-load">再読込</button>
      </div>
      <div id="msg" class="msg"></div>
      <p class="hint">
        保存後、現場 v2 は
        <a id="link-field" href="#">/genba/v2?company=…</a>
        から開いてください。
      </p>
    </div>
  </div>

<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const linesEl = $("lines");

  const MODE_TO_TIME = { day: "05:00", night: "07:00", h24: "08:00" };
  const TIME_TO_MODE = {
    "05:00": "day",
    "07:00": "night",
    "08:00": "h24",
  };

  function normalizeTime(t) {
    if (t == null || t === "") return "";
    const s = String(t).trim();
    const m = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?/);
    if (!m) return "";
    const hh = String(m[1]).padStart(2, "0");
    const mm = String(m[2]).padStart(2, "0");
    return hh + ":" + mm;
  }

  function getSelectedWorkMode() {
    const el = document.querySelector('input[name="work-mode"]:checked');
    return el ? el.value : "day";
  }

  function setWorkMode(mode) {
    const id =
      mode === "night" ? "wm-night" : mode === "h24" ? "wm-24h" : "wm-day";
    const r = document.getElementById(id);
    if (r) r.checked = true;
  }

  function updateBoundaryPreview() {
    const t = MODE_TO_TIME[getSelectedWorkMode()] || "05:00";
    $("boundary-preview-time").textContent = t;
  }

  function applyDayBoundaryFromApi(raw) {
    const n = normalizeTime(raw);
    const mismatchEl = $("boundary-mismatch");
    mismatchEl.hidden = true;
    mismatchEl.textContent = "";

    if (!n) {
      setWorkMode("day");
      updateBoundaryPreview();
      return;
    }

    const mode = TIME_TO_MODE[n];
    if (mode) {
      setWorkMode(mode);
      updateBoundaryPreview();
      return;
    }

    setWorkMode("day");
    updateBoundaryPreview();
    mismatchEl.hidden = false;
    mismatchEl.textContent =
      "※ 保存済みの業務日切替時刻は " +
      n +
      " です。上書きするには勤務形態を選んで「保存する」を押してください。";
  }

  document.querySelectorAll('input[name="work-mode"]').forEach((el) => {
    el.addEventListener("change", () => {
      $("boundary-mismatch").hidden = true;
      updateBoundaryPreview();
    });
  });

  function showMsg(ok, text) {
    const m = $("msg");
    m.className = "msg " + (ok ? "ok" : "ng");
    m.textContent = text;
  }

  function hideMsg() {
    const m = $("msg");
    m.className = "msg";
    m.textContent = "";
  }

  function splitPart(segment) {
    const s = String(segment).trim();
    if (!s) return { name: "", proc: "" };
    for (let i = 0; i < s.length; i++) {
      const ch = s[i];
      if (ch === ":" || ch === "：") {
        return { name: s.slice(0, i).trim(), proc: s.slice(i + 1).trim() };
      }
    }
    return { name: s, proc: "" };
  }

  function escapeAttr(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/"/g, "&quot;")
      .replace(/</g, "&lt;");
  }

  function addLine(name = "", proc = "") {
    const wrap = document.createElement("div");
    wrap.className = "row-line";
    wrap.innerHTML =
      `<div><label>班長名</label><input type="text" class="in-name" value="${escapeAttr(name)}" placeholder="例: 木村" autocomplete="off" /></div>` +
      `<div><label>工程</label><input type="text" class="in-proc" value="${escapeAttr(proc)}" placeholder="例: 組立" autocomplete="off" /></div>` +
      `<button type="button" class="btn-remove" title="削除">×</button>`;
    wrap.querySelector(".btn-remove").addEventListener("click", () => wrap.remove());
    linesEl.appendChild(wrap);
  }

  function collectLeaders() {
    const out = [];
    linesEl.querySelectorAll(".row-line").forEach((row) => {
      const name = row.querySelector(".in-name").value.trim();
      const process = row.querySelector(".in-proc").value.trim();
      if (name) out.push({ name, process });
    });
    return out;
  }

  function renderFromFieldUsers(raw) {
    linesEl.innerHTML = "";
    const parts = String(raw || "").split(",").map((x) => x.trim()).filter(Boolean);
    if (!parts.length) {
      addLine();
      return;
    }
    parts.forEach((p) => {
      const { name, proc } = splitPart(p);
      addLine(name, proc);
    });
  }

  function updateFieldLink() {
    const c = $("company-id").value.trim() || "x";
    const a = $("link-field");
    a.href = "/genba/v2?company=" + encodeURIComponent(c);
    a.textContent = "/genba/v2?company=" + c;
  }

  /** DB を正とする。ここには company_id のみ（班長・境界時刻は GET で復元） */
  const LS_LAST_COMPANY = "sr_v2_last_company";
  /** blur 時に同じ会社を再 GET しない（編集中の上書き防止・無駄な通信抑制） */
  let lastFetchedCompanyId = "";

  function rememberCompanyContext(cid) {
    const c = String(cid || "").trim();
    if (!c) return;
    try {
      localStorage.setItem(LS_LAST_COMPANY, c);
      const u = new URL(location.href);
      u.searchParams.set("company", c);
      history.replaceState(null, "", u.pathname + u.search + u.hash);
    } catch (_) { /* ok */ }
  }

  async function api(method, path, body) {
    const opt = { method, headers: {} };
    if (body != null && method !== "GET") {
      opt.headers["Content-Type"] = "application/json";
      opt.body = JSON.stringify(body);
    }
    const res = await fetch(path, opt);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      const d = data.detail;
      const msg = typeof d === "string" ? d : (d && JSON.stringify(d)) || res.statusText || String(res.status);
      throw new Error(msg);
    }
    return data;
  }

  async function load() {
    hideMsg();
    const cid = $("company-id").value.trim();
    if (!cid) {
      showMsg(false, "company_id を入力してください");
      return;
    }
    try {
      const data = await api("GET", "/v2/company/" + encodeURIComponent(cid));
      $("company_name").value =
        data.company_name != null && data.company_name !== undefined
          ? String(data.company_name)
          : "";
      const pkg = String(data.package_code || "A").trim().toUpperCase().slice(0, 1);
      $("package_code").value = ["A", "B", "C", "D"].includes(pkg) ? pkg : "A";
      renderFromFieldUsers(data.field_users || "");
      applyDayBoundaryFromApi(data.day_boundary_time);
      const tv = data.tolerance_value;
      $("tolerance_value").value =
        tv === null || tv === undefined ? "" : String(tv);
      lastFetchedCompanyId = cid;
      rememberCompanyContext(cid);
      showMsg(true, "読み込みました");
      updateFieldLink();
    } catch (e) {
      showMsg(false, String(e.message || e));
    }
  }

  async function save() {
    hideMsg();
    const cid = $("company-id").value.trim();
    if (!cid) {
      showMsg(false, "company_id を入力してください");
      return;
    }
    const leaders = collectLeaders();
    try {
      const boundaryTime = MODE_TO_TIME[getSelectedWorkMode()] || "05:00";
      const tolRaw = String($("tolerance_value").value).trim();
      let tolerancePayload = null;
      if (tolRaw !== "") {
        const n = Number(tolRaw.replace(",", "."));
        if (!Number.isFinite(n)) {
          showMsg(false, "許容差は数値で入力してください");
          return;
        }
        tolerancePayload = Math.round(n);
        if (tolerancePayload < 0) {
          showMsg(false, "許容差は 0 以上で入力してください");
          return;
        }
      }
      const pkgSel = String($("package_code").value || "A").trim().toUpperCase().slice(0, 1);
      const package_code = ["A", "B", "C", "D"].includes(pkgSel) ? pkgSel : "A";
      const data = await api("PUT", "/v2/company/" + encodeURIComponent(cid) + "/leaders", {
        leaders,
        day_boundary_time: boundaryTime,
        company_name: $("company_name").value.trim(),
        tolerance_value: tolerancePayload,
        package_code,
      });
      applyDayBoundaryFromApi(data.day_boundary_time);
      if (data.company_name != null && data.company_name !== undefined) {
        $("company_name").value = String(data.company_name);
      }
      if (data.package_code) {
        const p = String(data.package_code).trim().toUpperCase().slice(0, 1);
        if (["A", "B", "C", "D"].includes(p)) $("package_code").value = p;
      }
      const tv = data.tolerance_value;
      $("tolerance_value").value =
        tv === null || tv === undefined ? "" : String(tv);
      lastFetchedCompanyId = cid;
      rememberCompanyContext(cid);
      const preview = leaders.length
        ? leaders.map((L) => (L.process ? L.name + "（" + L.process + "）" : L.name)).join("、")
        : "（なし）";
      showMsg(
        true,
        "保存しました（業務日切替 " +
          boundaryTime +
          "／班長 " +
          data.saved_count +
          "名）: " +
          preview,
      );
      updateFieldLink();
    } catch (e) {
      showMsg(false, String(e.message || e));
    }
  }

  $("btn-add").addEventListener("click", () => addLine());
  $("btn-save").addEventListener("click", save);
  $("btn-load").addEventListener("click", load);
  $("company-id").addEventListener("change", updateFieldLink);
  $("company-id").addEventListener("input", updateFieldLink);
  $("company-id").addEventListener("blur", () => {
    const cid = $("company-id").value.trim();
    if (!cid) return;
    if (cid === lastFetchedCompanyId) return;
    load();
  });

  const qs = new URLSearchParams(location.search);
  const fromUrl = (qs.get("company") || qs.get("company_id") || "").trim();
  let fromStore = "";
  try {
    fromStore = (localStorage.getItem(LS_LAST_COMPANY) || "").trim();
  } catch (_) { /* ok */ }
  const q = fromUrl || fromStore;
  if (q) {
    $("company-id").value = q;
    load();
  } else if (!linesEl.children.length) {
    addLine();
  }
  updateBoundaryPreview();
  updateFieldLink();
})();
</script>
</body>
</html>
